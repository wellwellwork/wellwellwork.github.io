<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7EE"/>
      <stop offset="1" stop-color="#F0F8F2"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E68A3F"/>
      <stop offset="1" stop-color="#4FA86F"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E68A3F"/>
      <stop offset="1" stop-color="#4FA86F"/>
    </linearGradient>
    <style>
      .zh { font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, -apple-system, sans-serif; }
      .en { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="1080" cy="80" r="80" fill="#E68A3F" opacity="0.08"/>
  <circle cx="120" cy="540" r="100" fill="#4FA86F" opacity="0.10"/>

  <!-- Logo box -->
  <g transform="translate(90, 90)">
    <rect width="100" height="100" rx="22" fill="url(#logoG)"/>
    <path d="M22 34 L30 78 L38 50 L46 78 L54 34" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M46 34 L54 78 L62 50 L70 78 L78 34" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  </g>

  <!-- Brand text next to logo -->
  <text x="220" y="155" class="en" font-size="34" font-weight="600" fill="#2A2A2A">WellWell Work</text>
  <text x="220" y="190" class="zh" font-size="22" fill="#666">好好工作 · Independent studio · Since 2018</text>

  <!-- Main heading -->
  <text x="90" y="350" class="zh" font-size="92" font-weight="800" fill="url(#fg)">好好工作</text>
  <text x="90" y="430" class="en" font-size="56" font-weight="700" fill="#2A2A2A">Work that works.</text>

  <!-- Tagline -->
  <text x="90" y="510" class="zh" font-size="26" fill="#555">做自己想用的工具 · 复利不是冲刺 · Build in Public</text>

  <!-- Bottom URL -->
  <text x="90" y="580" class="en" font-size="22" font-weight="500" fill="#888">wellwell.work</text>
  <text x="1110" y="580" class="zh" font-size="22" fill="#888" text-anchor="end">🐾</text>
</svg>
