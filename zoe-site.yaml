# 博客
blog:
  title: 博客 · Build in Public
  description: 独立产品、复利杠杆、好好工作的日常笔记
  basePath: /blog
  postsPerPage: 10

# 内容
contentDirs:
  - content

contentTypes:
  - name: post
    path: posts
    template: post
  - name: page
    path: pages
    template: page

# 产品列表 — 也可以在 sections 里直接 inline，这里集中定义方便复用
products:
  - slug: wuma
    name: wuma · 无码
    tagline: AI 落地页生成器 / Code that dances. Apps that ship.
    description: 用 AI 几分钟生成专业的产品落地页，海外 indie hacker 与国内独立开发者的轻量级武器。
    url: https://wuma.dev
    status: building
    launchedAt: "2026-06"
    category: AI · SaaS

  - slug: zshare
    name: zshare · 资源分享
    tagline: 综合资源导航站 / Find what's worth sharing.
    description: 知识、网盘、工具、教程一站收录，2600+ 条资源持续更新中。
    url: https://zshare.wencai.app
    status: live
    launchedAt: "2025-09"
    category: 内容 · Site

  - slug: motion
    name: motion · 知识库
    tagline: 开源知识库编辑器 / Knowledge that flows.
    description: 纯前端、数据存 GitHub 的轻量知识库工具，零后端、可自托管。
    url: https://motion.wencai.app
    status: live
    launchedAt: "2025-12"
    category: 开源 · OSS

  - slug: tools
    name: AI Tools Directory
    tagline: AI 工具集 / Tools that just work.
    description: 精选 AI 工具导航，按场景与分类整理，帮助开发者快速找到趁手的家伙。
    url: https://tools.wencai.app
    status: live
    launchedAt: "2025-11"
    category: 内容 · Site

# Homepage Sections
sections:
  - type: hero
    badge: "🐾 Independent · Building since 2018"
    greeting: 好好工作
    typingTexts:
      - 好好生活
      - 做想用的工具
      - 复利杠杆
      - Work that works.
    description: 一家追求"好好工作"的独立公司。我们做自己想用的工具，慢慢长出可持续的事业。An independent studio building tools we want to use ourselves.
    cta:
      - text: 看看产品 / See Products
        href: "#products"
      - text: 关注 build-in-public
        href: https://twitter.com/wellwellwork
        variant: outline
    align: center

  - type: products
    title: 产品 · Products
    description: 我们正在做的、还在长大的、和已经长出来的小生意。 What we ship.
    limit: 6

  - type: features
    title: 我们怎么工作 · How we work
    description: 三件小事，一直在做。
    columns: 3
    style: cards
    items:
      - icon: "🌱"
        title: 做自己想用的
        description: 不追风口、不追大盘。我们做的每一个工具，都先满足自己的真实需求，再考虑别人。
      - icon: "🔁"
        title: 复利 · 不是冲刺
        description: 慢一点，长一点。把时间花在能持续滚雪球的事情上，比短平快重要。
      - icon: "🪟"
        title: Build in Public
        description: 在 X 上记录每一步：上线、踩坑、收入、复盘。透明做事，吸引同频的人。

  - type: stats
    items:
      - value: "4"
        label: 在做的产品 / Products
      - value: "2018"
        label: 起步年份 / Since
      - value: "1+🐾"
        label: 团队规模 / Team
      - value: "∞"
        label: 想做的事 / Ideas

  - type: posts
    title: 博客 · Build-in-Public
    description: 上线、踩坑、收入复盘，写给未来的自己。
    limit: 4
    mode: grid

  - type: cta
    title: 一起好好工作 · Let's work well together
    description: 喜欢我们的产品？想合作、想聊聊、想给点意见？一封邮件、一条 DM 都行。
    cta:
      - text: hi@wellwell.work
        href: mailto:hi@wellwell.work
      - text: Twitter / X
        href: https://twitter.com/wellwellwork
        variant: outline
    style: gradient

  - type: contact
    style: simple
    email: hi@wellwell.work
    links:
      - title: GitHub
        href: https://github.com/wellwellwork
        icon: github
      - title: Twitter / X
        href: https://twitter.com/wellwellwork
        icon: twitter
      - title: Email
        href: mailto:hi@wellwell.work
        icon: mail

