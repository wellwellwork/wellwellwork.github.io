          - Dedicated account manager
          - Custom integrations
          - SSO & SAML
          - 99.99% SLA
          - On-premise deployment
        cta:
          text: Contact Sales
          href: mailto:sales@flowai.dev

  - type: faq
    title: Frequently asked questions
    description: Everything you need to know about FlowAI
    items:
      - question: How does FlowAI use AI in workflows?
        answer: FlowAI integrates large language models directly into your workflow steps. You can use AI to classify incoming data, extract information from documents, generate responses, summarize content, and make intelligent routing decisions — all without writing code.
      - question: Can I connect FlowAI to my existing tools?
        answer: Yes! FlowAI offers 200+ pre-built integrations with popular tools like Slack, GitHub, Notion, Jira, Google Workspace, Salesforce, and more. You can also use our REST API and webhooks to connect to any custom service.
      - question: Is FlowAI secure enough for enterprise use?
        answer: Absolutely. FlowAI is SOC 2 Type II certified with end-to-end encryption, SSO/SAML support, role-based access control, and audit logging. We also offer on-premise deployment for organizations with strict compliance requirements.
      - question: What happens if I exceed my plan limits?
        answer: We will notify you as you approach your limits. On the Starter plan, workflows will pause until the next billing cycle. Pro and Enterprise plans can be configured to auto-scale, and we will never surprise you with unexpected charges.
      - question: How long does it take to set up my first workflow?
        answer: Most users create their first workflow in under 5 minutes using our visual builder and pre-built templates. Our onboarding guide walks you through the basics, and our support team is always available to help.

  - type: cta
    title: Ready to automate your workflows?
    description: Join thousands of teams using FlowAI to ship faster and work smarter.
    cta:
      - text: Start for Free
        href: https://app.flowai.dev/signup
      - text: Talk to Sales
        href: mailto:sales@flowai.dev
        variant: outline
    style: gradient
