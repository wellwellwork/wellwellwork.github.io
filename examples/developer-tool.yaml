# DevKit — The modern developer toolkit

title: DevKit
description: The modern developer toolkit. Build, test, and deploy with confidence.
url: https://devkit.sh
logo: /images/devkit-logo.svg
lang: en

# Author / Company
author:
  name: DevKit
  email: team@devkit.sh

organization:
  name: DevKit
  url: https://devkit.sh

copyright:
  from: 2024
  holder: DevKit

# Theme — clean Vercel-inspired minimal style
theme: vercel

# Navigation
navs:
  - title: Features
    href: /#features
  - title: Pricing
    href: /#pricing
  - title: Docs
    href: /docs
  - title: Blog
    href: /blog

# Social links
socials:
  github: https://github.com/devkit
  twitter: https://twitter.com/devkit

# Footer links
links:
  - title: Features
    category: Product
    href: /#features
  - title: Pricing
    category: Product
    href: /#pricing
